<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ucapan Idul Fitri</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle, #2c3e50, #000000);
            color: #f1c40f;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
            max-width: 400px;
            border: 1px solid rgba(241, 196, 15, 0.3);
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .arabic {
            font-size: 28px;
            margin: 15px 0;
            display: block;
            color: #fff;
        }

        .pesan {
            font-size: 16px;
            line-height: 1.6;
            color: #ecf0f1;
            margin-top: 20px;
            min-height: 100px; /* Jaga ruang untuk teks */
        }

        .signature {
            margin-top: 30px;
            font-size: 14px;
            color: #f1c40f;
            font-weight: bold;
        }

        /* Animasi Bintang Sederhana */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="stars" id="starField"></div>

    <div class="container">
        <h1>Selamat Idul Fitri</h1>
        <span class="arabic">تَقَبَّلَ اللَّهُ مِنَّا وَمِنْكُمْ</span>
        
        <div class="pesan" id="typingText"></div>

        <div class="signature">
            — Dari Sahabatmu —
        </div>
    </div>

    <script>
        // Masukkan kata-katamu di sini
        const teks = "Mungkin jemari tak sempat menjabat, namun hati selalu terpaut. Di hari yang fitri ini, mohon maafkan segala salah yang sengaja maupun tak sengaja. Minal 'Aidin wal-Faizin, mohon maaf lahir dan batin ya!,jika ada kesalahan tolong di maafkan jika tidak ada juga harus dimaafkan intinya mohon maaf lahir dan batin🙏🏻";
        
        let i = 0;
        const speed = 50; // Kecepatan mengetik (ms)

        function typeWriter() {
            if (i < teks.length) {
                document.getElementById("typingText").innerHTML += teks.charAt(i);
                i++;
                setTimeout(typeWriter, speed);
            }
        }

        // Jalankan animasi setelah halaman dimuat
        window.onload = typeWriter;

        // Tambahkan efek bintang acak
        const starField = document.getElementById('starField');
        for (let i = 0; i < 50; i++) {
            const star = document.createElement('div');
            star.style.position = 'absolute';
            star.style.width = '2px';
            star.style.height = '2px';
            star.style.backgroundColor = '#fff';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.opacity = Math.random();
            starField.appendChild(star);
        }
    </script>
</body>
    </html>
